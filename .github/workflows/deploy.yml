
name: Nginx Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Nginx
        run: |
          sudo apt update
          sudo apt install nginx -y

      - name: Verify Nginx
        run: nginx -v